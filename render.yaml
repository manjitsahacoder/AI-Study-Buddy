services:
  - type: web
    name: ai-study-buddy
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER_DISK_PATH
        value: /var/data
    disk:
      name: ai-study-buddy-data
      mountPath: /var/data
      sizeGB: 1

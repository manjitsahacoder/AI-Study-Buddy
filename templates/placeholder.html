<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} - AI Study Buddy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<button id="theme-toggle" onclick="toggleTheme()">
    &#127769; Dark Mode
</button>

<main class="learn-container auth-container">
    <div class="auth-header-row">
        <div>
            <span class="eyebrow">Account</span>
            <h1>{{ page_title }}</h1>
        </div>
        <div class="auth-page-actions">
            <a class="button-link secondary-link" href="{{ url_for('home') }}">Back to Home</a>
            {% include 'components/auth_nav.html' %}
        </div>
    </div>

    {% include 'components/flash_messages.html' %}

    <section class="profile-card">
        <h2>{{ heading }}</h2>
        <p>{{ message }}</p>
    </section>

    {% include 'components/footer.html' %}
</main>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark-mode");

    let btn = document.getElementById("theme-toggle");
    if (document.body.classList.contains("dark-mode")) {
        btn.innerHTML = "&#9728;&#65039; Light Mode";
    } else {
        btn.innerHTML = "&#127769; Dark Mode";
    }
}
</script>
</body>
</html>

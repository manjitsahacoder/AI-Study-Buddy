<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - AI Study Buddy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-page">
<button id="theme-toggle" onclick="toggleTheme()">
    &#127769; Dark Mode
</button>

<main class="learn-container auth-container">
    <div class="auth-header-row">
        <div>
            <span class="eyebrow">Account</span>
            <h1>Register</h1>
        </div>
        <a class="button-link secondary-link" href="{{ url_for('home') }}">Back to Home</a>
    </div>

    {% include 'components/flash_messages.html' %}

    <form class="study-form auth-form" action="{{ url_for('register') }}" method="POST">
        <div class="form-grid">
            <div class="form-field">
                <label for="full_name">&#128100; Full Name</label>
                <input
                    id="full_name"
                    type="text"
                    name="full_name"
                    value="{{ form_data.full_name }}"
                    placeholder="Enter full name"
                    required
                    autocomplete="name"
                >
            </div>

            <div class="form-field">
                <label for="username">&#128273; Username</label>
                <input
                    id="username"
                    type="text"
                    name="username"
                    value="{{ form_data.username }}"
                    placeholder="Choose a username"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-field">
                <label for="email">&#9993; Email</label>
                <input
                    id="email"
                    type="email"
                    name="email"
                    value="{{ form_data.email }}"
                    placeholder="Enter email"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-field">
                <label for="student_class">&#127891; Class</label>
                <select id="student_class" name="student_class" required>
                    <option value="">Select class</option>
                    {% for class_number in range(6, 13) %}
                    <option value="{{ class_number }}" {% if form_data.student_class == class_number|string %}selected{% endif %}>
                        Class {{ class_number }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-field">
                <label for="password">&#128274; Password</label>
                <input
                    id="password"
                    type="password"
                    name="password"
                    placeholder="Create password"
                    required
                    autocomplete="new-password"
                >
            </div>

            <div class="form-field">
                <label for="confirm_password">&#128274; Confirm Password</label>
                <input
                    id="confirm_password"
                    type="password"
                    name="confirm_password"
                    placeholder="Confirm password"
                    required
                    autocomplete="new-password"
                >
            </div>
        </div>

        <button type="submit">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>

    {% include 'components/footer.html' %}
</main>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark-mode");

    let btn = document.getElementById("theme-toggle");
    if (document.body.classList.contains("dark-mode")) {
        btn.innerHTML = "&#9728;&#65039; Light Mode";
    } else {
        btn.innerHTML = "&#127769; Dark Mode";
    }
}
</script>
</body>
</html>

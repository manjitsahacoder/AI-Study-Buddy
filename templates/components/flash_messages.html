{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="flash-messages" role="status" aria-live="polite">
    {% for category, message in messages %}
    <div class="flash-message flash-{{ category }}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}

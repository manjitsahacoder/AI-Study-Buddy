<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ topic }} - AI Study Buddy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<button id="theme-toggle" onclick="toggleTheme()">
    &#127769; Dark Mode
</button>

<div class="learn-container">
    <h1>&#128218; {{ topic }}</h1>
    <div class="lesson-info-strip">
        <span><strong>Student</strong> {{ name }}</span>
        <span><strong>Class</strong> {{ student_class }}</span>
        <span><strong>Subject</strong> {{ subject }}</span>
        {% if book_name %}
        <span><strong>Book</strong> {{ book_name }}</span>
        {% endif %}
        <span><strong>Topic</strong> {{ topic }}</span>
    </div>

    <hr>

    <div class="content">
        {{ explanation|safe }}
    </div>

    <div class="diagram-card">
        <h2>&#128202; Diagram</h2>
        <img class="diagram-image" src="{{ diagram_image }}" alt="{{ topic }} diagram">
    </div>

    <hr>

    <form action="{{ url_for('download_notes') }}" method="POST" class="notes-download-form">
        <input type="hidden" name="name" value="{{ name }}">
        <input type="hidden" name="student_class" value="{{ student_class }}">
        <input type="hidden" name="subject" value="{{ subject }}">
        <input type="hidden" name="book_name" value="{{ book_name }}">
        <input type="hidden" name="topic" value="{{ topic }}">
        <textarea name="notes" hidden>{{ notes }}</textarea>
        <textarea name="diagram_image" hidden>{{ diagram_image }}</textarea>

        <button type="submit">
            &#128196; Download Notes
        </button>
    </form>

    <form action="{{ url_for('quiz') }}" method="POST" class="quiz-start-form">
        <input type="hidden" name="name" value="{{ name }}">
        <input type="hidden" name="student_class" value="{{ student_class }}">
        <input type="hidden" name="subject" value="{{ subject }}">
        <input type="hidden" name="topic" value="{{ topic }}">
        {% for question in questions %}
        <input type="hidden" name="question{{ loop.index }}" value="{{ question }}">
        {% endfor %}

        <button type="submit">
            &#128221; Start Quiz
        </button>
    </form>

    <a class="button-link back-btn" href="{{ url_for('home') }}">
        &larr; Back to Home
    </a>

    <footer>
        <p>&#129302; Powered by Gemini AI</p>
        <p>Developed by Manjit</p>
    </footer>
</div>

<script>
window.onload = function() {
    window.scrollTo(0, 0);
};

function toggleTheme() {
    document.body.classList.toggle("dark-mode");

    let btn = document.getElementById("theme-toggle");
    if (document.body.classList.contains("dark-mode")) {
        btn.innerHTML = "&#9728;&#65039; Light Mode";
    } else {
        btn.innerHTML = "&#127769; Dark Mode";
    }
}
</script>
</body>
</html>

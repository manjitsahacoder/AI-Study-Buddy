<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ topic }} Quiz - AI Study Buddy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<button id="theme-toggle" onclick="toggleTheme()">
    &#127769; Dark Mode
</button>

<div class="learn-container quiz-container">
    <h1>&#128221; {{ topic }} Quiz</h1>
    <div class="lesson-info-strip">
        <span><strong>Student</strong> {{ name }}</span>
        <span><strong>Class</strong> {{ student_class }}</span>
        <span><strong>Subject</strong> {{ subject }}</span>
        <span><strong>Topic</strong> {{ topic }}</span>
    </div>

    <div class="quiz-box">
        <p>Answer all five questions, then submit them for AI feedback.</p>

        <form action="{{ url_for('submit_answers') }}" method="POST">
            <input type="hidden" name="name" value="{{ name }}">
            <input type="hidden" name="student_class" value="{{ student_class }}">
            <input type="hidden" name="subject" value="{{ subject }}">
            <input type="hidden" name="topic" value="{{ topic }}">

            {% for question in questions %}
            <div class="quiz-question">
                <label for="answer{{ loop.index }}">
                    <strong>Q{{ loop.index }}. {{ question }}</strong>
                </label>
                <input type="hidden" name="question{{ loop.index }}" value="{{ question }}">
                <textarea
                    id="answer{{ loop.index }}"
                    name="answer{{ loop.index }}"
                    rows="4"
                    placeholder="Type your answer here..."
                    required></textarea>
            </div>
            {% endfor %}

            <button type="submit">
                &#127919; Submit Answers
            </button>
        </form>
    </div>

    <button type="button" class="back-btn quiz-back-button" onclick="history.back()">
        &larr; Back to Notes
    </button>

    <footer>
        <p>&#129302; Powered by Gemini AI</p>
        <p>Developed by Manjit</p>
    </footer>
</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark-mode");

    let btn = document.getElementById("theme-toggle");
    if (document.body.classList.contains("dark-mode")) {
        btn.innerHTML = "&#9728;&#65039; Light Mode";
    } else {
        btn.innerHTML = "&#127769; Dark Mode";
    }
}
</script>
</body>
</html>
